<div class="p-3">
    <div class="card-body">
        <h3>Products Component</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Selected</th>
                    <th>delete</th>
                </tr>
            </thead>
            @if (products) {
                <tbody>
                <!-- <tbody *ngIf="products"> -->
                    @for(p of products; track p) {
                        <tr>
                        <!-- <tr *ngFor="let p of products"> -->
                            <td>{{p.id}}</td>
                            <td>{{p.name}}</td>
                            <td>{{p.price}}</td>
                            <td>
                                @if(p.selected) {
                                    <i class="bi bi-check-circle"></i>
                                } @else {
                                    <i class="bi bi-x-circle"></i>
                                }
                            </td>
                            <td>
                                <button (click)="handelDelete(p)" class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    }
                </tbody>
            }
        </table>
    </div>  
</div>
